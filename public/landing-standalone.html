document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"bfa0b6b2-7f2a-4056-bb5e-720c65b1b0b9\") format('woff2');\n  unicode-range: U+0100-02BA, U+02BD-02C5, U+02C7-02CC, U+02CE-02D7, U+02DD-02FF, U+0304, U+0308, U+0329, U+1D00-1DBF, U+1E00-1E9F, U+1EF2-1EFF, U+2020, U+20A0-20AB, U+20AD-20C0, U+2113, U+2C60-2C7F, U+A720-A7FF;\n}\n/* latin */\n@font-face {\n  font-family: 'Geist Mono';\n  font-style: normal;\n  font-weight: 600;\n  font-display: swap;\n  src: url(\"40d0783c-2d59-4604-a7f0-f043c16fad6f\") format('woff2');\n  unicode-range: U+0000-00FF, U+0131, U+0152-0153, U+02BB-02BC, U+02C6, U+02DA, U+02DC, U+0304, U+0308, U+0329, U+2000-206F, U+20AC, U+2122, U+2191, U+2193, U+2212, U+2215, U+FEFF, U+FFFD;\n}\n\n\n/* LongCipher — Color tokens\n * Monochrome canvas + workflow accents. The system is overwhelmingly white\n * with near-black text; color appears only on intent (deploy, preview, build).\n */\n:root {\n  /* ---- Brand neutrals (the canvas) ---- */\n  --color-black: #000000;\n  --color-ink: #171717;        /* \"Vercel Black\" — primary text, dark surfaces */\n  --color-white: #ffffff;      /* page background, card surfaces */\n\n  /* ---- Neutral scale (grayscale ramp) ---- */\n  --gray-50:  #fafafa;\n  --gray-100: #f2f2f2;\n  --gray-200: #ebebeb;\n  --gray-300: #e0e0e0;\n  --gray-400: #c9c9c9;\n  --gray-500: #a3a3a3;\n  --gray-600: #8f8f8f;\n  --gray-700: #666666;\n  --gray-800: #454545;\n  --gray-900: #2e2e2e;\n  --gray-1000: #171717;\n\n  /* ---- Workflow accents (semantic to the deploy lifecycle) ---- */\n  --accent-ship:    #ff5b4f;   /* Ship Red — production / primary CTA */\n  --accent-ship-ink:#e5392c;   /* pressed / hover-dark */\n  --accent-preview: #de1d8d;   /* Preview Pink — preview deployments */\n  --accent-develop: #0070f3;   /* Develop Blue — console, syntax, links */\n  --accent-develop-ink: #0a5fd0;\n  --accent-violet:  #7928ca;   /* gradient partner for pink */\n\n  /* ---- Status ---- */\n  --status-success: #0070f3;   /* blue stands in for \"ready\" in this system */\n  --status-ready:   #00b341;   /* deployment ready / green dot */\n  --status-error:   #ff5b4f;\n  --status-warning: #f5a623;\n  --status-queued:  #8f8f8f;\n\n  /* ---- Semantic aliases (use these in product) ---- */\n  --bg-base:        var(--color-white);\n  --bg-subtle:      var(--gray-50);\n  --bg-inset:       var(--gray-100);\n  --bg-inverted:    var(--color-ink);\n\n  --surface-card:   var(--color-white);\n  --surface-overlay:var(--color-white);\n\n  --text-primary:   var(--color-ink);\n  --text-secondary: var(--gray-700);\n  --text-tertiary:  var(--gray-600);\n  --text-disabled:  var(--gray-500);\n  --text-inverted:  var(--color-white);\n  --text-link:      var(--accent-develop);\n\n  --border-default: rgba(0, 0, 0, 0.08);   /* the shadow-as-border line */\n  --border-strong:  rgba(0, 0, 0, 0.14);\n  --border-inverted:rgba(255, 255, 255, 0.14);\n\n  --focus-ring:     var(--accent-develop);\n}\n\n/* LongCipher — Typography tokens\n * Geist Sans for everything UI; Geist Mono for code, data, metrics.\n * Signature move: aggressive NEGATIVE letter-spacing that tightens as size grows.\n * Never use positive tracking on Geist Sans.\n */\n:root {\n  /* ---- Families ---- */\n  --font-sans: 'Geist', -apple-system, BlinkMacSystemFont, 'Segoe UI', Helvetica, Arial, sans-serif;\n  --font-mono: 'Geist Mono', ui-monospace, 'SF Mono', 'Menlo', 'Consolas', monospace;\n\n  /* ---- Weights ---- */\n  --weight-regular: 400;\n  --weight-medium: 500;\n  --weight-semibold: 600;\n  --weight-bold: 700;\n\n  /* ---- Type scale (px) ---- */\n  --text-display: 72px;\n  --text-h1: 60px;\n  --text-h2: 48px;\n  --text-h3: 32px;\n  --text-h4: 24px;\n  --text-lg: 18px;\n  --text-base: 15px;   /* body */\n  --text-sm: 14px;\n  --text-xs: 13px;\n  --text-caption: 12px;\n\n  /* ---- Line heights ---- */\n  --leading-tight: 1.05;\n  --leading-snug: 1.2;\n  --leading-normal: 1.5;\n  --leading-relaxed: 1.6;\n\n  /* ---- Letter-spacing (always <= 0 for Geist Sans) ---- */\n  --tracking-display: -2.88px;\n  --tracking-h1: -2.4px;\n  --tracking-h2: -1.8px;\n  --tracking-h3: -1.2px;\n  --tracking-h4: -0.6px;\n  --tracking-base: -0.18px;\n  --tracking-tight: -0.01em;\n  --tracking-mono: 0;          /* mono is the only family allowed neutral tracking */\n\n  /* ---- Semantic roles ---- */\n  --type-display-size: var(--text-display);\n  --type-display-tracking: var(--tracking-display);\n  --type-body-size: var(--text-base);\n  --type-body-leading: var(--leading-normal);\n}\n\n/* Optional helper classes mirroring the role tokens. */\n.lc-display {\n  font-family: var(--font-sans);\n  font-size: var(--text-display);\n  font-weight: var(--weight-semibold);\n  line-height: var(--leading-tight);\n  letter-spacing: var(--tracking-display);\n  text-wrap: balance;\n}\n.lc-h1 { font-family: var(--font-sans); font-size: var(--text-h1); font-weight: var(--weight-semibold); line-height: var(--leading-tight); letter-spacing: var(--tracking-h1); text-wrap: balance; }\n.lc-h2 { font-family: var(--font-sans); font-size: var(--text-h2); font-weight: var(--weight-semibold); line-height: var(--leading-snug); letter-spacing: var(--tracking-h2); }\n.lc-h3 { font-family: var(--font-sans); font-size: var(--text-h3); font-weight: var(--weight-semibold); line-height: var(--leading-snug); letter-spacing: var(--tracking-h3); }\n.lc-body { font-family: var(--font-sans); font-size: var(--text-base); font-weight: var(--weight-regular); line-height: var(--leading-normal); letter-spacing: var(--tracking-base); }\n.lc-mono { font-family: var(--font-mono); font-size: var(--text-sm); letter-spacing: var(--tracking-mono); font-feature-settings: 'liga' 1, 'tnum' 1; }\n\n/* LongCipher — Spacing, radii & sizing tokens\n * 4px base grid. Nested radii: outer container radius = inner radius + padding.\n */\n:root {\n  /* ---- Spacing scale (4px base) ---- */\n  --space-0: 0;\n  --space-1: 4px;\n  --space-2: 8px;\n  --space-3: 12px;\n  --space-4: 16px;\n  --space-5: 20px;\n  --space-6: 24px;\n  --space-8: 32px;\n  --space-10: 40px;\n  --space-12: 48px;\n  --space-16: 64px;\n  --space-20: 80px;\n  --space-24: 96px;\n  --space-32: 128px;\n\n  /* ---- Radii (nested-radii system) ---- */\n  --radius-xs: 4px;\n  --radius-sm: 6px;\n  --radius-md: 8px;\n  --radius-lg: 12px;\n  --radius-xl: 16px;\n  --radius-2xl: 24px;\n  --radius-full: 9999px;\n\n  /* ---- Control heights ---- */\n  --control-sm: 32px;\n  --control-md: 40px;\n  --control-lg: 48px;\n\n  /* ---- Layout ---- */\n  --container-max: 1200px;\n  --container-prose: 720px;\n  --gutter: 24px;\n}\n\n/* LongCipher — Elevation & shadow tokens\n * SHADOW-AS-BORDER is the signature technique: a hairline lives in the shadow\n * layer (0 0 0 1px rgba(0,0,0,.08)) instead of a CSS border. Depth is built by\n * stacking that ring with soft ambient shadows + an inner white highlight ring.\n */\n:root {\n  /* The hairline ring — replaces `border: 1px solid` everywhere. */\n  --ring-hairline: 0 0 0 1px rgba(0, 0, 0, 0.08);\n  --ring-strong:   0 0 0 1px rgba(0, 0, 0, 0.14);\n  --ring-focus:    0 0 0 2px var(--color-white), 0 0 0 4px var(--accent-develop);\n  --ring-inset-top:inset 0 1px 0 0 rgba(255, 255, 255, 0.6);\n\n  /* Elevation steps — each composes the hairline ring + ambient shadow. */\n  --elevation-flat:     0 0 0 1px rgba(0, 0, 0, 0.06);\n  --elevation-base:     0 0 0 1px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.04);\n  --elevation-raised:   0 0 0 1px rgba(0, 0, 0, 0.08), 0 2px 4px rgba(0, 0, 0, 0.06), 0 4px 8px rgba(0, 0, 0, 0.04);\n  --elevation-overlay:  0 0 0 1px rgba(0, 0, 0, 0.08), 0 8px 24px rgba(0, 0, 0, 0.12);\n  --elevation-popover:  0 0 0 1px rgba(0, 0, 0, 0.06), 0 12px 32px rgba(0, 0, 0, 0.16), inset 0 1px 0 0 rgba(255, 255, 255, 0.7);\n\n  /* Button depth — crisp 1px ring + tiny ambient drop. */\n  --shadow-button:      0 0 0 1px rgba(0, 0, 0, 0.08), 0 1px 2px rgba(0, 0, 0, 0.08);\n  --shadow-button-color:0 1px 2px rgba(0, 0, 0, 0.12), inset 0 0 0 1px rgba(255, 255, 255, 0.12);\n\n  /* Semantic aliases */\n  --shadow-card:    var(--elevation-base);\n  --shadow-card-hover: var(--elevation-raised);\n  --shadow-input:   var(--ring-hairline);\n  --shadow-dropdown:var(--elevation-popover);\n\n  /* Motion — compositor-friendly only (transform/opacity). Never `all`. */\n  --ease-standard: cubic-bezier(0.4, 0, 0.2, 1); /* @kind other */\n  --ease-out: cubic-bezier(0.16, 1, 0.3, 1); /* @kind other */\n  --ease-spring: cubic-bezier(0.34, 1.56, 0.64, 1); /* @kind other */\n  --duration-fast: 120ms; /* @kind other */\n  --duration-base: 180ms; /* @kind other */\n  --duration-slow: 280ms; /* @kind other */\n}\n\n/* Shared keyframes used by components (spinners, dots). */\n@keyframes lc-spin { to { transform: rotate(360deg); } }\n@keyframes lc-pulse { 0%, 100% { opacity: 1; } 50% { opacity: 0.45; } }\n\n<\u002Fstyle>\n<link rel=\"icon\" type=\"image/png\" href=\"9d33ac43-8a37-475d-832d-2bde58ba3e9b\">\n<style>\n  * { margin: 0; padding: 0; box-sizing: border-box; }\n\n  body {\n    background: var(--bg-base);\n    color: var(--text-primary);\n    font-family: var(--font-sans);\n    line-height: var(--leading-normal);\n    letter-spacing: var(--tracking-base);\n    -webkit-font-smoothing: antialiased;\n    /* Brand accent — swappable via the accent switcher. Default: Ship Red. */\n    --brand: var(--accent-violet);\n    --brand-ink: #5E1EA3;\n    --brand-glow: radial-gradient(60% 120% at 50% 0%, rgba(121,40,202,0.45), rgba(222,29,141,0.20) 44%, transparent 72%);\n    --brand-tint: #F8F6FD;\n  }\n  ::selection { background: rgba(0,112,243,0.16); }\n\n  .container { max-width: var(--container-max); margin: 0 auto; padding: 0 24px; }\n\n  a { color: inherit; }\n\n  /* ---- Header ---- */\n  header {\n    position: sticky; top: 0; z-index: 20;\n    background: rgba(255,255,255,0.8);\n    backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);\n    box-shadow: inset 0 -1px 0 0 var(--border-default);\n  }\n  nav { display: flex; justify-content: space-between; align-items: center; height: 64px; }\n  .logo { display: flex; align-items: center; gap: 10px; }\n  .logo-mark {\n    width: 28px; height: 28px; border-radius: 7px;\n    display: block; object-fit: cover; flex: none;\n  }\n  .logo-text { font-size: 17px; font-weight: 600; letter-spacing: -0.4px; line-height: 1; }\n  .logo-lockup { display: flex; flex-direction: column; }\n  .logo-sub { font-size: 9px; font-weight: 600; letter-spacing: 3.5px; color: var(--text-tertiary); margin-top: 3px; }\n  .nav-links { display: flex; gap: 28px; align-items: center; }\n  .nav-links > a {\n    color: var(--text-secondary); text-decoration: none; font-size: 14px;\n    letter-spacing: -0.18px; transition: color var(--duration-fast) var(--ease-standard);\n  }\n  .nav-links > a:hover { color: var(--text-primary); }\n  .nav-actions { display: flex; gap: 10px; align-items: center; }\n\n  /* ---- Buttons (shadow-as-border) ---- */\n  .btn {\n    display: inline-flex; align-items: center; justify-content: center; gap: 8px;\n    height: var(--control-md); padding: 0 16px;\n    border-radius: var(--radius-md); border: none;\n    font-family: var(--font-sans); font-size: 14px; font-weight: 500;\n    letter-spacing: -0.18px; line-height: 1; text-decoration: none; white-space: nowrap;\n    cursor: pointer;\n    transition: background var(--duration-fast) var(--ease-standard),\n                box-shadow var(--duration-fast) var(--ease-standard),\n                transform var(--duration-fast) var(--ease-standard);\n  }\n  .btn-lg { height: var(--control-lg); padding: 0 22px; font-size: 15px; }\n  .btn-sm { height: var(--control-sm); padding: 0 12px; font-size: 13px; }\n  .btn-primary { background: var(--brand); color: #fff; box-shadow: var(--shadow-button-color); }\n  .btn-primary:hover { background: var(--brand-ink); }\n  .btn-primary:active { transform: translateY(0.5px); }\n  .btn-inverted { background: var(--color-ink); color: #fff; box-shadow: 0 1px 2px rgba(0,0,0,0.16); }\n  .btn-inverted:hover { background: #000; }\n  .btn-secondary { background: var(--color-white); color: var(--text-primary); box-shadow: var(--shadow-button); }\n  .btn-secondary:hover { background: var(--gray-50); }\n  .btn-ghost { background: transparent; color: var(--text-secondary); }\n  .btn-ghost:hover { color: var(--text-primary); background: var(--gray-100); }\n  .btn-block { width: 100%; }\n\n  .icon { display: block; flex: none; }\n\n  /* ---- Hero ---- */\n  .hero { padding: 96px 0 72px; text-align: center; }\n  .eyebrow {\n    display: inline-flex; align-items: center; gap: 7px;\n    height: 26px; padding: 0 12px; margin-bottom: 24px;\n    border-radius: var(--radius-full); box-shadow: var(--ring-hairline);\n    font-size: 12.5px; font-weight: 500; color: var(--text-secondary); letter-spacing: -0.1px;\n  }\n  .eyebrow .dot { width: 6px; height: 6px; border-radius: 50%; background: var(--brand); }\n  .hero h1 {\n    font-size: 68px; font-weight: 600; line-height: 0.98;\n    letter-spacing: -2.8px; text-wrap: balance;\n  }\n  .hero .sub {\n    max-width: 600px; margin: 24px auto 0;\n    font-size: 19px; line-height: 1.5; letter-spacing: -0.3px;\n    color: var(--text-tertiary); text-wrap: pretty;\n  }\n  .hero-buttons { display: flex; gap: 12px; justify-content: center; margin-top: 32px; }\n  .hero .fineprint { margin-top: 18px; font-size: 13px; color: var(--text-tertiary); }\n  .hero .fineprint code { font-family: var(--font-mono); }\n\n  /* ---- Readiness mock (replaces hero illustration) ---- */\n  .mock {\n    max-width: 720px; margin: 56px auto 0; text-align: left;\n    background: var(--surface-card); border-radius: var(--radius-xl);\n    box-shadow: var(--elevation-overlay); overflow: hidden;\n  }\n  .mock-bar {\n    display: flex; align-items: center; gap: 8px; padding: 12px 16px;\n    box-shadow: inset 0 -1px 0 0 var(--border-default);\n  }\n  .mock-bar .tdot { width: 11px; height: 11px; border-rad -radius-lg);\n    box-shadow: var(--elevation-base); padding: 24px;\n    transition: box-shadow var(--duration-base) var(--ease-out), transform var(--duration-base) var(--ease-out);\n  }\n  .feature-card:hover { box-shadow: var(--elevation-raised); transform: translateY(-1px); }\n  .feature-ico {\n    width: 40px; height: 40px; border-radius: var(--radius-md);\n    background: var(--brand-tint); box-shadow: var(--ring-hairline);\n    display: flex; align-items: center; justify-content: center; color: var(--brand-ink);\n  }\n  .feature-card h3 { margin: 18px 0 8px; font-size: 17px; font-weight: 600; letter-spacing: -0.4px; }\n  .feature-card p { font-size: 14.5px; line-height: 1.55; color: var(--text-tertiary); letter-spacing: -0.18px; text-wrap: pretty; }\n\n  /* ---- How it works ---- */\n  .steps { max-width: 760px; margin: 0 auto; display: grid; gap: 16px; }\n  .step {\n    display: flex; gap: 18px; align-items: flex-start;\n    background: var(--surface-card); border-radius: var(--radius-lg);\n    box-shadow: var(--elevation-base); padding: 22px 24px;\n  }\n  .step-num {\n    width: 32px; height: 32px; border-radius: var(--radius-full);\n    background: var(--color-ink); color: #fff; flex: none;\n    display: flex; align-items: center; justify-content: center;\n    font-family: var(--font-mono); font-size: 14px; font-weight: 500;\n  }\n  .step h3 { font-size: 16px; font-weight: 600; letter-spacing: -0.3px; margin-bottom: 5px; }\n  .step p { color: var(--text-tertiary); font-size: 14.5px; letter-spacing: -0.18px; }\n\n  /* ---- Pricing ---- */\n  .pricing-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 16px; max-width: 1040px; margin: 0 auto; align-items: start; }\n  .pricing-card {\n    position: relative; background: var(--surface-card);\n    border-radius: var(--radius-xl); box-shadow: var(--elevation-base);\n    padding: 28px 26px;\n  }\n  .pricing-card.popular { box-shadow: var(--ring-strong), 0 8px 24px rgba(0,0,0,0.10); }\n  .pop-badge {\n    position: absolute; top: -11px; left: 50%; transform: translateX(-50%);\n    display: inline-flex; align-items: center; gap: 6px;\n    height: 22px; padding: 0 11px; border-radius: var(--radius-full);\n    background: var(--color-ink); color: #fff; font-size: 11px; font-weight: 500; letter-spacing: -0.1px;\n  }\n  .plan-name { font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-tertiary); }\n  .price { font-size: 44px; font-weight: 600; letter-spacing: -2px; margin: 14px 0 4px; }\n  .price span { font-size: 16px; font-weight: 400; letter-spacing: -0.3px; color: var(--text-tertiary); }\n  .price-note { color: var(--text-tertiary); font-size: 13px; margin-bottom: 24px; letter-spacing: -0.18px; }\n  .plan-features { list-style: none; margin: 0 0 28px; display: flex; flex-direction: column; gap: 0; }\n  .plan-features li {\n    display: flex; align-items: flex-start; gap: 10px; padding: 10px 0;\n    font-size: 14px; letter-spacing: -0.18px; color: var(--text-secondary);\n    box-shadow: inset 0 -1px 0 0 var(--border-default);\n  }\n  .plan-features li:last-child { box-shadow: none; }\n  .plan-features .ck { color: var(--status-ready); margin-top: 1px; flex: none; }\n  .plan-features .no { color: var(--gray-400); margin-top: 1px; flex: none; }\n  .plan-features li.off { color: var(--text-disabled); }\n  .pricing-card .cancel { text-align: center; font-size: 12px; color: var(--text-tertiary); margin-top: 12px; }\n\n  /* ---- Final CTA ---- */\n  .cta-band { padding: 0 0 88px; }\n  .cta-panel {\n    position: relative; overflow: hidden;\n    border-radius: var(--radius-2xl); background: var(--color-ink);\n    padding: 72px 24px; text-align: center;\n  }\n  .cta-glow { position: absolute; inset: 0; background: var(--brand-glow); pointer-events: none; }\n  .cta-panel h2 { position: relative; font-size: 46px; font-weight: 600; letter-spacing: -2px; color: #fff; line-height: 1.04; text-wrap: balance; }\n  .cta-panel p { p nel ---- */\n  .tweaks-panel {\n    position: fixed; top: 80px; right: 24px; z-index: 60; width: 264px;\n    background: var(--surface-card); color: var(--text-primary);\n    border-radius: var(--radius-lg); box-shadow: var(--elevation-popover);\n    padding: 16px; font-family: var(--font-sans);\n  }\n  .tweaks-panel[hidden] { display: none; }\n  .tw-head { display: flex; align-items: center; justify-content: space-between; margin-bottom: 14px; }\n  .tw-title { font-size: 14px; font-weight: 600; letter-spacing: -0.3px; }\n  .tw-close {\n    width: 26px; height: 26px; display: flex; align-items: center; justify-content: center;\n    border: none; background: transparent; color: var(--text-tertiary); cursor: pointer;\n    border-radius: var(--radius-sm); font-size: 18px; line-height: 1;\n  }\n  .tw-close:hover { background: var(--gray-100); color: var(--text-primary); }\n  .tw-group { margin-bottom: 14px; }\n  .tw-group:last-child { margin-bottom: 0; }\n  .tw-label { font-size: 11px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--text-tertiary); margin-bottom: 8px; }\n  .tw-seg { display: flex; gap: 4px; background: var(--gray-100); padding: 4px; border-radius: var(--radius-md); }\n  .tw-seg button {\n    flex: 1; height: 30px; border: none; background: transparent; border-radius: var(--radius-sm);\n    font-family: var(--font-sans); font-size: 12.5px; font-weight: 500; letter-spacing: -0.1px;\n    color: var(--text-secondary); cursor: pointer;\n    transition: background var(--duration-fast) var(--ease-standard), color var(--duration-fast) var(--ease-standard);\n  }\n  .tw-seg button[aria-pressed=\"true\"] { background: var(--surface-card); color: var(--text-primary); box-shadow: var(--ring-hairline); }\n  .tw-swatches { display: flex; gap: 8px; }\n  .tw-swatches button {\n    width: 30px; height: 30px; border-radius: 50%; border: none; cursor: pointer; padding: 0;\n    box-shadow: 0 0 0 1px rgba(0,0,0,0.10);\n    transition: transfo ">ARIA<\u002Fdiv>\n        <\u002Fdiv>\n        <p>The AI coach for U.S. insurance licensing exams. Built to help professionals pass with confidence.<\u002Fp>\n      <\u002Fdiv>\n      <div class=\"footer-bottom\" style=\"box-shadow:none;padding:0;gap:48px\">\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <span style=\"font-weight:600;color:var(--text-primary)\">Product<\u002Fspan>\n          <a href=\"#features\" style=\"text-decoration:none\">Features<\u002Fa>\n          <a href=\"#pricing\" style=\"text-decoration:none\">Pricing<\u002Fa>\n          <a href=\"#how\" style=\"text-decoration:none\">How it works<\u002Fa>\n        <\u002Fdiv>\n        <div style=\"display:flex;flex-direction:column;gap:9px\">\n          <span style=\"font-weight:600;color:var(--text-primary)\">Company<\u002Fspan>\n          <a href=\"#\" style=\"text-decoration:none\">About<\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none\">Contact<\u002Fa>\n          <a href=\"#\" style=\"text-decoration:none\">Privacy<\u002Fa>\n        <\u002Fdiv>\n      <\u002Fdiv>\n    <\u002Fdiv>\n    <div class=\"footer-bottom\">\n      <span>© 2026 ARIA. Not affiliated with any state Department of Insurance or exam provider.<\u002Fspan>\n      <span class=\"mono\"><span class=\"dot\"><\u002Fspan> All systems operational<\u002Fspan>\n    <\u002Fdiv>\n  <\u002Fdiv>\n<\u002Ffooter>\n\n<script>\n  // Tweakable defaults — the host rewrites this block on disk so changes persist.\n  const TWEAKS = /*EDITMODE-BEGIN*/{\n    \"theme\": \"light\",\n    \"accent\": \"Violet\",\n    \"energy\": \"restrained\"\n  }/*EDITMODE-END*/;\n\n  // Each accent keeps LongCipher's canvas and recolors only the \"pop\" surfaces.\n  const ACCENTS = [\n    { name: 'Ship Red',     brand: '#FF5B4F', ink: '#E5392C', rgb: '255,91,79',  glow: 'rgba(255,91,79,0.42)',  glow2: 'rgba(121,40,202,0.18)' },\n    { name: 'Develop Blue', brand: '#0070F3', ink: '#0A5FD0', rgb: '0,112,243',  glow: 'rgba(0,112,243,0.45)',  glow2: 'rgba(121,40,202,0.18)' },\n    { name: 'Preview Pink', brand: '#DE1D8D', ink: '#B51572', rgb: '222,29,141', glow: 'rgba(222,29,141,0.42)', glow2: 'rgba(121,40,202,0.22)' },\n    { name: 'Emerald',      brand: '#00B341', ink: '#0A8A3A', rgb: '0,179,65',   glow: 'rgba(0,179,65,0.40)',   glow2: 'rgba(0,112,243,0.18)' },\n    { name: 'Violet',       brand: '#7928CA', ink: '#5E1EA3', rgb: '121,40,202', glow: 'rgba(121,40,202,0.45)', glow2: 'rgba(222,29,141,0.20)' },\n  ];\n  const THEMES = [['light', 'Daylight'], ['dark', 'Midnight']];\n  const ENERGY = [['restrained', 'Restrained'], ['balanced', 'Balanced'], ['vivid', 'Vivid']];\n  const ENERGY_HINT = {\n    restrained: 'Mono canvas — accent only on the CTAs.',\n    balanced: 'Accent washes the trust strip & key sections.',\n    vivid: 'Color-forward — tinted features and a gradient CTA.',\n  };\n  const TINT_ALPHA = { restrained: 0, balanced: 0.07, vivid: 0.13 };\n\n  const state = { ...TWEAKS };\n\n  function applyAll() {\n    const a = ACCENTS.find((x) => x.name === state.accent) || ACCENTS[4];\n    const body = document.body;\n    body.dataset.theme = state.theme;\n    body.dataset.energy = state.energy;\n    const s = body.style;\n    s.setProperty('--brand', a.brand);\n    s.setProperty('--brand-ink', a.ink);\n    s.setProperty('--brand-glow', `radial-gradient(60% 120% at 50% 0%, ${a.glow}, ${a.glow2} 44%, transparent 72%)`);\n    const alpha = TINT_ALPHA[state.energy];\n    s.setProperty('--brand-tint', alpha ? `rgba(${a.rgb}, ${alpha})` : 'var(--bg-subtle)');\n    sync();\n  }\n\n  function persist() {\n    try { window.parent.postMessage({ type: '__edit_mode_set_keys', edits: { ...state } }, '*'); } catch (e) {}\n  }\n\n  // ---- Build controls ----\n  const elTheme = document.getElementById('twTheme');\n  const elAccent = document.getElementById('twAccent');\n  const elEnergy = document.getElementById('twEnergy');\n  const elHint = document.getElementById('twEnergyHint');\n\n  THEMES.forEach(([val, label]) => {\n    const b = document.createElement('button');\n    b.textContent = label; b.dataset.val = val;\n    b.onclick = () => { state.theme = val; applyAll(); persist(); };\n    elTheme.appendChild(b);\n  });\n  ACCENTS.forEach((a) => {\n    const b = document.createElement('button');\n    b.style.background = a.brand; b.style.color = a.brand; b.dataset.val = a.name;\n    b.title = a.name; b.setAttribute('aria-label', a.name);\n    b.onclick = () => { state.accent = a.name; applyAll(); persist(); };\n    elAccent.appendChild(b);\n  });\n  ENERGY.forEach(([val, label]) => {\n    const b = document.createElement('button');\n    b.textContent = label; b.dataset.val = val;\n    b.onclick = () => { state.energy = val; applyAll(); persist(); };\n    elEnergy.appendChild(b);\n  });\n\n  function sync() {\n    [...elTheme.children].forEach((b) => b.setAttribute('aria-pressed', b.dataset.val === state.theme));\n    [...elAccent.children].forEach((b) => b.setAttribute('aria-pressed', b.dataset.val === state.accent));\n    [...elEnergy.children].forEach((b) => b.setAttribute('aria-pressed', b.dataset.val === state.energy));\n    elHint.textContent = ENERGY_HINT[state.energy] || '';\n  }\n\n  applyAll();\n\n  // ---- Tweaks host protocol ----\n  const panel = document.getElementById('tweaksPanel');\n  window.addEventListener('message', (e) => {\n    const t = e.data && e.data.type;\n    if (t === '__activate_edit_mode') panel.hidden = false;\n    else if (t === '__deactivate_edit_mode') panel.hidden = true;\n  });\n  document.getElementById('twClose').onclick = () => {\n    panel.hidden = true;\n    try { window.parent.postMessage({ type: '__edit_mode_dismissed' }, '*'); } catch (e) {}\n  };\n  try { window.parent.postMessage({ type: '__edit_mode_available' }, '*'); } catch (e) {}\n<\u002Fscript>\n\n\n\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
