<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — PassPro AI Study Companion</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg:        #0F0A07;
    --bg2:       #170E09;
    --surface:   rgba(255,255,255,0.04);
    --border:    rgba(201,135,79,0.15);
    --amber:     #C9874F;
    --amber-dim: rgba(201,135,79,0.5);
    --amber-glow:rgba(201,135,79,0.08);
    --text:      #EDE0D4;
    --muted:     rgba(237,224,212,0.4);
    --faint:     rgba(237,224,212,0.15);
  }

  html, body { height: 100%; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    display: flex;
    flex-direction: column;
    min-height: 100vh;
    overflow: hidden;
  }

  /* Ambient background glow */
  body::before {
    content: '';
    position: fixed;
    top: -30%;
    left: 50%;
    transform: translateX(-50%);
    width: 800px;
    height: 500px;
    background: radial-gradient(ellipse, rgba(201,135,79,0.06) 0%, transparent 70%);
    pointer-events: none;
    z-index: 0;
  }

  /* ── HEADER ── */
  header {
    position: relative;
    z-index: 10;
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    background: rgba(15,10,7,0.8);
    backdrop-filter: blur(12px);
    flex-shrink: 0;
  }

  .brand {
    display: flex;
    align-items: center;
    gap: 14px;
  }

  .brand-mark {
    width: 42px;
    height: 42px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C9874F 0%, #7B3910 100%);
    display: flex;
    align-items: center;
    justify-content: center;
    font-family: 'Josefin Sans', sans-serif;
    font-weight: 600;
    font-size: 14px;
    letter-spacing: 1px;
    color: #fff;
    box-shadow: 0 0 0 1px rgba(201,135,79,0.3), 0 4px 20px rgba(201,135,79,0.2);
  }

  .brand-text { line-height: 1; }
  .brand-name {
    font-family: 'Josefin Sans', sans-serif;
    font-size: 20px;
    font-weight: 600;
    letter-spacing: 4px;
    color: var(--text);
  }
  .brand-sub {
    font-size: 10px;
    letter-spacing: 2.5px;
    color: var(--amber-dim);
    margin-top: 3px;
    font-weight: 300;
  }

  .header-right {
    display: flex;
    align-items: center;
    gap: 20px;
  }

  .powered-by {
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--faint);
    font-weight: 300;
  }

  .live-dot {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 10px;
    letter-spacing: 2px;
    color: var(--amber-dim);
    font-weight: 300;
  }
  .live-dot::before {
    content: '';
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: #10b981;
    box-shadow: 0 0 8px #10b981;
    animation: pulse 2s ease-in-out infinite;
  }

  /* ── MAIN LAYOUT ── */
  main {
    position: relative;
    z-index: 1;
    flex: 1;
    display: flex;
    overflow: hidden;
  }

  /* ── SIDEBAR ── */
  .sidebar {
    width: 260px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    padding: 28px 20px;
    gap: 8px;
    overflow-y: auto;
  }

  .sidebar-label {
    font-size: 9px;
    letter-spacing: 3px;
    color: var(--faint);
    font-weight: 300;
    margin-bottom: 4px;
    margin-top: 16px;
    padding-left: 4px;
  }
  .sidebar-label:first-child { margin-top: 0; }

  .mode-btn {
    display: flex;
    align-items: center;
    gap: 10px;
    padding: 10px 14px;
    border-radius: 10px;
    border: 1px solid transparent;
    background: transparent;
    color: var(--muted);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 12px;
    letter-spacing: 1.5px;
    font-weight: 400;
    cursor: pointer;
    transition: all 0.2s;
    text-align: left;
    width: 100%;
  }
  .mode-btn:hover {
    background: var(--amber-glow);
    color: var(--text);
    border-color: var(--border);
  }
  .mode-btn.active {
    background: rgba(201,135,79,0.12);
    border-color: rgba(201,135,79,0.3);
    color: var(--amber);
  }
  .mode-icon { font-size: 16px; width: 20px; }
  .mode-desc {
    font-size: 10px;
    letter-spacing: 0.5px;
    color: var(--faint);
    margin-top: 2px;
    font-weight: 300;
  }
  .mode-btn.active .mode-desc { color: rgba(201,135,79,0.4); }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 8px 0;
  }

  .clear-btn {
    margin-top: auto;
    padding: 8px 14px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--faint);
    font-family: 'Josefin Sans', sans-serif;
    font-size: 10px;
    letter-spacing: 2px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .clear-btn:hover { color: var(--muted); border-color: var(--amber-dim); }

  /* ── CHAT AREA ── */
  .chat-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 0;
    scroll-behavior: smooth;
  }

  .messages::-webkit-scrollbar { width: 4px; }
  .messages::-webkit-scrollbar-thumb { background: rgba(201,135,79,0.2); border-radius: 4px; }
  .messages::-webkit-scrollbar-track { background: transparent; }

  /* Empty state */
  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    flex: 1;
    min-height: 300px;
    gap: 24px;
    animation: fadeIn 0.5s ease;
  }

  .empty-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 32px;
    font-weight: 300;
    font-style: italic;
    color: var(--text);
    text-align: center;
    line-height: 1.3;
  }

  .empty-sub {
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--amber-dim);
    font-weight: 300;
    text-align: center;
  }

  .starters {
    display: flex;
    flex-direction: column;
    gap: 8px;
    width: 100%;
    max-width: 480px;
  }

  .starter-btn {
    padding: 12px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--muted);
    font-family: 'Cormorant Garamond', serif;
    font-size: 15px;
    font-weight: 400;
    cursor: pointer;
    text-align: left;
    transition: all 0.2s;
    line-height: 1.4;
  }
  .starter-btn:hover {
    background: var(--amber-glow);
    border-color: rgba(201,135,79,0.3);
    color: var(--text);
  }

  /* Messages */
  .msg {
    display: flex;
    margin-bottom: 20px;
    animation: slideUp 0.3s ease;
  }
  .msg.user { justify-content: flex-end; }
  .msg.assistant { justify-content: flex-start; }

  .avatar {
    width: 32px;
    height: 32px;
    border-radius: 50%;
    background: linear-gradient(135deg, #C9874F, #7B3910);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 1px;
    color: #fff;
    flex-shrink: 0;
    margin-right: 12px;
    margin-top: 2px;
  }

  .bubble {
    max-width: 72%;
    padding: 14px 18px;
    border-radius: 4px 18px 18px 18px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.75;
    white-space: pre-wrap;
    word-break: break-word;
  }

  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
    color: var(--text);
  }

  .msg.user .bubble {
    background: linear-gradient(135deg, #C9874F, #A0522D);
    color: #FFF8F2;
    border-radius: 18px 18px 4px 18px;
    font-size: 15px;
  }

  /* Typing indicator */
  .typing {
    display: flex;
    align-items: center;
    gap: 5px;
    padding: 14px 18px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 4px 18px 18px 18px;
  }
  .typing span {
    width: 7px; height: 7px;
    border-radius: 50%;
    background: var(--amber);
    animation: bounce 1.2s ease-in-out infinite;
  }
  .typing span:nth-child(2) { animation-delay: 0.15s; }
  .typing span:nth-child(3) { animation-delay: 0.3s; }

  /* Error */
  .error-msg {
    padding: 10px 16px;
    background: rgba(220,80,60,0.08);
    border: 1px solid rgba(220,80,60,0.2);
    border-radius: 10px;
    color: #F0A090;
    font-size: 13px;
    letter-spacing: 0.5px;
    margin-bottom: 16px;
  }

  /* ── INPUT AREA ── */
  .input-area {
    flex-shrink: 0;
    padding: 16px 40px 24px;
    border-top: 1px solid var(--border);
    background: rgba(15,10,7,0.6);
    backdrop-filter: blur(8px);
  }

  .input-wrap {
    display: flex;
    align-items: flex-end;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(201,135,79,0.25);
    border-radius: 16px;
    padding: 10px 10px 10px 18px;
    transition: border-color 0.2s;
  }
  .input-wrap:focus-within { border-color: rgba(201,135,79,0.5); }

  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.6;
    resize: none;
    max-height: 120px;
    overflow-y: auto;
  }
  textarea::placeholder { color: var(--faint); }
  textarea::-webkit-scrollbar { width: 3px; }
  textarea::-webkit-scrollbar-thumb { background: rgba(201,135,79,0.2); }

  .send-btn {
    width: 38px;
    height: 38px;
    border-radius: 10px;
    border: none;
    background: linear-gradient(135deg, #C9874F, #A0522D);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    transition: all 0.2s;
    opacity: 0.4;
  }
  .send-btn.ready { opacity: 1; }
  .send-btn.ready:hover { background: linear-gradient(135deg, #D9975F, #B0623D); transform: translateY(-1px); }
  .send-btn svg { width: 16px; height: 16px; }

  .input-hint {
    text-align: center;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--faint);
    margin-top: 10px;
    font-weight: 300;
  }

  /* ── FOOTER ── */
  footer {
    position: relative;
    z-index: 10;
    text-align: center;
    padding: 10px;
    font-size: 9px;
    letter-spacing: 2px;
    color: rgba(237,224,212,0.1);
    border-top: 1px solid rgba(201,135,79,0.06);
    flex-shrink: 0;
  }

  /* ── ANIMATIONS ── */
  @keyframes pulse { 0%,100%{opacity:1;transform:scale(1)} 50%{opacity:0.5;transform:scale(0.85)} }
  @keyframes bounce { 0%,80%,100%{transform:translateY(0);opacity:0.4} 40%{transform:translateY(-5px);opacity:1} }
  @keyframes slideUp { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }
  @keyframes fadeIn  { from{opacity:0} to{opacity:1} }
</style>
</head>
<body>

<!-- HEADER -->
<header>
  <div class="brand">
    <div class="brand-mark">A</div>
    <div class="brand-text">
      <div class="brand-name">ARIA</div>
      <div class="brand-sub">PASSPRO AI STUDY COMPANION</div>
    </div>
  </div>
  <div class="header-right">
    <span class="powered-by">POWERED BY PASSPRO</span>
    <span class="live-dot">LIVE</span>
  </div>
</header>

<!-- MAIN -->
<main>

  <!-- SIDEBAR -->
  <aside class="sidebar">
    <div class="sidebar-label">STUDY MODE</div>

    <button class="mode-btn active" onclick="setMode('study', this)">
      <span class="mode-icon">📚</span>
      <div>
        <div>STUDY</div>
        <div class="mode-desc">Explain concepts & mnemonics</div>
      </div>
    </button>

    <button class="mode-btn" onclick="setMode('quiz', this)">
      <span class="mode-icon">⚡</span>
      <div>
        <div>QUIZ ME</div>
        <div class="mode-desc">Generate practice questions</div>
      </div>
    </button>

    <button class="mode-btn" onclick="setMode('coach', this)">
      <span class="mode-icon">🎯</span>
      <div>
        <div>COACH</div>
        <div class="mode-desc">Personalized study plan</div>
      </div>
    </button>

    <div class="divider"></div>
    <div class="sidebar-label">EXAM TOPICS</div>

    <button class="mode-btn" onclick="quickStart('Quiz me on Wisconsin Statutes and Regulations')">
      <span class="mode-icon">📋</span>
      <div>
        <div>WI STATUTES</div>
        <div class="mode-desc">17% of exam</div>
      </div>
    </button>

    <button class="mode-btn" onclick="quickStart('Explain life insurance policy provisions and riders')">
      <span class="mode-icon">📄</span>
      <div>
        <div>POLICY PROVISIONS</div>
        <div class="mode-desc">14% of exam</div>
      </div>
    </button>

    <button class="mode-btn" onclick="quickStart('Quiz me on whole life insurance concepts')">
      <span class="mode-icon">🏦</span>
      <div>
        <div>WHOLE LIFE</div>
        <div class="mode-desc">12% of exam</div>
      </div>
    </button>

    <button class="mode-btn" onclick="quickStart('Explain annuities for the PSI exam')">
      <span class="mode-icon">📈</span>
      <div>
        <div>ANNUITIES</div>
        <div class="mode-desc">10% of exam</div>
      </div>
    </button>

    <button class="mode-btn" onclick="quickStart('Quiz me on qualified plans and IRAs')">
      <span class="mode-icon">💼</span>
      <div>
        <div>QUALIFIED PLANS</div>
        <div class="mode-desc">7% of exam</div>
      </div>
    </button>

    <div class="divider"></div>

    <button class="clear-btn" onclick="clearChat()">CLEAR CHAT</button>
  </aside>

  <!-- CHAT -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <div class="empty-state" id="empty">
        <div class="brand-mark" style="width:56px;height:56px;font-size:18px;">A</div>
        <div>
          <div class="empty-title">Ready when you are.</div>
          <div class="empty-sub" style="margin-top:8px;">WHAT WOULD YOU LIKE TO STUDY?</div>
        </div>
        <div class="starters">
          <button class="starter-btn" onclick="quickStart('What is the grace period for Wisconsin life insurance and why does it matter for the exam?')">What is the grace period for Wisconsin life insurance?</button>
          <button class="starter-btn" onclick="quickStart('Explain the difference between Universal Life Option A and Option B')">Explain UL Option A vs Option B</button>
          <button class="starter-btn" onclick="quickStart('Give me 5 hard practice questions on Wisconsin statutes')">Give me 5 hard Wisconsin statute questions</button>
          <button class="starter-btn" onclick="quickStart('What are the non-forfeiture options and how do I remember them?')">What are the non-forfeiture options?</button>
        </div>
      </div>
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea
          id="input"
          rows="1"
          placeholder="Ask ARIA anything about the insurance exam…"
          onkeydown="handleKey(event)"
          oninput="handleInput(this)"
        ></textarea>
        <button class="send-btn" id="send-btn" onclick="send()">
          <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
      <div class="input-hint">SHIFT + ENTER FOR NEW LINE &nbsp;·&nbsp; POWERED BY CLAUDE</div>
    </div>
  </div>

</main>

<footer>© 2026 PASSPRO · AI STUDY COMPANION · CONFIDENTIAL DEMO</footer>

<script>
  const PROXY = 'https://payflow-production-28a9.up.railway.app/api/aria';

  const SYSTEM = `You are ARIA — an expert AI study companion for the Wisconsin PSI insurance licensing exams (Life Series 22-03 and Accident & Health).

You have deep knowledge of all exam content including:
- Life Insurance Basics (16%), Term Life (9%), Whole Life (12%), Other Life Policies (8%)
- Policy Provisions, Riders & Options (14%), Annuities (10%)
- Federal Tax Considerations (7%), Qualified Plans (7%)
- Wisconsin Statutes, Rules & Regulations (17%)

Key Wisconsin-specific facts:
- Grace period: 31 days (life and A&H), 10 days (weekly premium A&H)
- Free-look: 10 days standard, 30 days for replacement policies
- Incontestability: 2 years
- Reinstatement: within 3 years, proof of insurability required
- WI Guaranty Association: $300K death benefit, $100K cash value, $250K annuity
- Continuing education: 24 hours per 2-year renewal, 3 hours ethics
- Commissioner: appointed by Governor, 4-year term
- Twisting, churning, rebating all prohibited

Be direct, precise, and exam-focused. Always give the correct answer WITH full rationale. Call out common exam traps. Format responses clearly with headers and bullet points where helpful.`;

  const MODE_PROMPTS = {
    study: 'Mode: STUDY. Explain concepts clearly, use mnemonics, connect to exam blueprint weights, give examples.',
    quiz:  'Mode: QUIZ ME. Generate one practice question at a time. After the user answers, reveal the correct answer with full rationale and any exam traps.',
    coach: 'Mode: COACH. Analyze what the user tells you about their performance. Identify their weak areas, tell them exactly what to study and in what order, set a study plan.'
  };

  let messages = [];
  let mode = 'study';
  let loading = false;

  function setMode(m, btn) {
    mode = m;
    document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
  }

  function handleKey(e) {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); send(); }
  }

  function handleInput(el) {
    el.style.height = 'auto';
    el.style.height = Math.min(el.scrollHeight, 120) + 'px';
    document.getElementById('send-btn').classList.toggle('ready', el.value.trim().length > 0);
  }

  function quickStart(text) {
    document.getElementById('input').value = text;
    handleInput(document.getElementById('input'));
    send();
  }

  async function send() {
    const input = document.getElementById('input');
    const text = input.value.trim();
    if (!text || loading) return;

    // Hide empty state
    const empty = document.getElementById('empty');
    if (empty) empty.remove();

    input.value = '';
    input.style.height = 'auto';
    document.getElementById('send-btn').classList.remove('ready');
    loading = true;

    messages.push({ role: 'user', content: text });
    renderMessage('user', text);
    showTyping();

    try {
      const res = await fetch(PROXY, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          system: SYSTEM + '\n\n' + MODE_PROMPTS[mode],
          messages
        })
      });

      const data = await res.json();
      if (data.error) throw new Error(data.error);

      const reply = data.content?.find(b => b.type === 'text')?.text || '';
      messages.push({ role: 'assistant', content: reply });

      removeTyping();
      renderMessage('assistant', reply);

    } catch (err) {
      removeTyping();
      showError(err.message);
    }

    loading = false;
    setTimeout(() => input.focus(), 50);
  }

  function renderMessage(role, content) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;

    if (role === 'assistant') {
      div.innerHTML = `
        <div class="avatar">A</div>
        <div class="bubble">${escHtml(content)}</div>`;
    } else {
      div.innerHTML = `<div class="bubble">${escHtml(content)}</div>`;
    }

    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function showTyping() {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'msg assistant';
    div.id = 'typing-indicator';
    div.innerHTML = `
      <div class="avatar">A</div>
      <div class="typing"><span></span><span></span><span></span></div>`;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function removeTyping() {
    const t = document.getElementById('typing-indicator');
    if (t) t.remove();
  }

  function showError(msg) {
    const box = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = 'error-msg';
    div.textContent = '⚠️ ' + msg;
    box.appendChild(div);
    box.scrollTop = box.scrollHeight;
  }

  function clearChat() {
    messages = [];
    const box = document.getElementById('messages');
    box.innerHTML = `
      <div class="empty-state" id="empty">
        <div class="brand-mark" style="width:56px;height:56px;font-size:18px;">A</div>
        <div>
          <div class="empty-title">Ready when you are.</div>
          <div class="empty-sub" style="margin-top:8px;">WHAT WOULD YOU LIKE TO STUDY?</div>
        </div>
        <div class="starters">
          <button class="starter-btn" onclick="quickStart('What is the grace period for Wisconsin life insurance and why does it matter for the exam?')">What is the grace period for Wisconsin life insurance?</button>
          <button class="starter-btn" onclick="quickStart('Explain the difference between Universal Life Option A and Option B')">Explain UL Option A vs Option B</button>
          <button class="starter-btn" onclick="quickStart('Give me 5 hard practice questions on Wisconsin statutes')">Give me 5 hard Wisconsin statute questions</button>
          <button class="starter-btn" onclick="quickStart('What are the non-forfeiture options and how do I remember them?')">What are the non-forfeiture options?</button>
        </div>
      </div>`;
  }

  function escHtml(str) {
    return str
      .replace(/&/g,'&amp;')
      .replace(/</g,'&lt;')
      .replace(/>/g,'&gt;')
      .replace(/\*\*(.+?)\*\*/g,'<strong>$1</strong>')
      .replace(/#{1,3} (.+)/g,'<strong>$1</strong>')
      .replace(/^- (.+)/gm,'• $1');
  }
</script>
