<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ARIA — PassPro AI Study Companion (Enhanced)</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;0,600;1,300;1,400&family=Josefin+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0F0A07;
    --surface: rgba(255,255,255,0.04);
    --border: rgba(201,135,79,0.15);
    --amber: #C9874F;
    --text: #EDE0D4;
    --muted: rgba(237,224,212,0.4);
  }
  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Josefin Sans', sans-serif;
    margin: 0;
    padding: 0;
    min-height: 100vh;
  }
  header {
    padding: 20px 32px;
    border-bottom: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    align-items: center;
    background: rgba(15,10,7,0.9);
  }
  .brand { display: flex; align-items: center; gap: 14px; }
  .brand-mark {
    width: 42px; height: 42px; border-radius: 50%;
    background: linear-gradient(135deg, #C9874F, #7B3910);
    display: flex; align-items: center; justify-content: center;
    font-weight: 600; font-size: 15px; color: #fff;
  }
  .brand-name { font-size: 20px; font-weight: 600; letter-spacing: 4px; }
  .brand-sub { font-size: 10px; letter-spacing: 2.5px; color: rgba(201,135,79,0.6); }

  main { display: flex; height: calc(100vh - 80px); }
  
  .sidebar {
    width: 240px;
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    background: rgba(0,0,0,0.2);
    overflow-y: auto;
  }
  .mode-btn {
    width: 100%;
    text-align: left;
    padding: 10px 14px;
    margin-bottom: 6px;
    background: transparent;
    border: 1px solid transparent;
    border-radius: 10px;
    color: var(--muted);
    font-size: 13px;
    cursor: pointer;
    transition: all 0.2s;
  }
  .mode-btn.active {
    background: rgba(201,135,79,0.12);
    border-color: rgba(201,135,79,0.35);
    color: #C9874F;
  }
  .mode-btn:hover { background: rgba(201,135,79,0.06); }

  .chat-area { flex: 1; display: flex; flex-direction: column; }
  .messages {
    flex: 1;
    overflow-y: auto;
    padding: 32px 40px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }
  .msg { display: flex; }
  .msg.user { justify-content: flex-end; }
  .avatar {
    width: 30px; height: 30px; border-radius: 50%;
    background: linear-gradient(135deg, #C9874F, #7B3910);
    display: flex; align-items: center; justify-content: center;
    font-size: 12px; font-weight: 600; color: #fff; flex-shrink: 0; margin-right: 12px;
  }
  .bubble {
    max-width: 70%;
    padding: 14px 18px;
    border-radius: 4px 18px 18px 18px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    line-height: 1.7;
    white-space: pre-wrap;
  }
  .msg.assistant .bubble {
    background: var(--surface);
    border: 1px solid var(--border);
  }
  .msg.user .bubble {
    background: linear-gradient(135deg, #C9874F, #A0522D);
    color: #FFF8F2;
    border-radius: 18px 18px 4px 18px;
  }

  .input-area {
    padding: 16px 40px 24px;
    border-top: 1px solid var(--border);
    background: rgba(15,10,7,0.6);
  }
  .input-wrap {
    display: flex;
    gap: 10px;
    background: var(--surface);
    border: 1px solid rgba(201,135,79,0.25);
    border-radius: 16px;
    padding: 10px 18px;
  }
  textarea {
    flex: 1;
    background: transparent;
    border: none;
    outline: none;
    color: var(--text);
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
    resize: none;
    max-height: 120px;
  }
  .send-btn {
    width: 38px; height: 38px;
    border-radius: 10px;
    background: linear-gradient(135deg, #C9874F, #A0522D);
    border: none;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }
</style>
</head>
<body>

<header>
  <div class="brand">
    <div class="brand-mark">A</div>
    <div>
      <div class="brand-name">ARIA</div>
      <div class="brand-sub">PASSPRO AI • ENHANCED</div>
    </div>
  </div>
  <div style="color: rgba(201,135,79,0.5); font-size: 11px; letter-spacing: 2px;">
    TOOL-POWERED MODE
  </div>
</header>

<main>
  <!-- Sidebar -->
  <aside class="sidebar">
    <div style="font-size:10px; letter-spacing:2px; color:rgba(237,224,212,0.3); margin-bottom:8px; padding-left:4px;">MODES</div>
    
    <button class="mode-btn active" onclick="setMode('study', this)">📚 Study Mode</button>
    <button class="mode-btn" onclick="setMode('quiz', this)">⚡ Quiz Me</button>
    <button class="mode-btn" onclick="setMode('coach', this)">🎯 Coach Mode</button>

    <div style="height:1px; background:rgba(201,135,79,0.1); margin:16px 0;"></div>
    
    <button class="mode-btn" onclick="quickStart('Give me a diagnostic quiz on Wisconsin Life Insurance')">Start Diagnostic Quiz</button>
    <button class="mode-btn" onclick="quickStart('Analyze my readiness and create a study plan')">Analyze Readiness + Plan</button>
    <button class="mode-btn" onclick="quickStart('What is the grace period in Wisconsin?')">Wisconsin Grace Period</button>
    
    <div style="margin-top:auto; padding-top:20px;">
      <button onclick="clearChat()" style="width:100%; padding:8px; background:transparent; border:1px solid rgba(201,135,79,0.2); color:rgba(237,224,212,0.4); border-radius:8px; font-size:11px; cursor:pointer;">
        CLEAR CHAT
      </button>
    </div>
  </aside>

  <!-- Chat -->
  <div class="chat-area">
    <div class="messages" id="messages">
      <!-- Messages injected by JS -->
    </div>

    <div class="input-area">
      <div class="input-wrap">
        <textarea id="input" rows="1" placeholder="Ask ARIA anything..." onkeydown="handleKey(event)"></textarea>
        <button class="send-btn" onclick="send()">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="#FFF8F2" stroke-width="2.5">
            <path d="M12 19V5M5 12l7-7 7 7"/>
          </svg>
        </button>
      </div>
    </div>
  </div>
</main>

<script>
// Configuration - Change this to your deployed API route
const ARIA_API_URL = "/api/aria";   // Use this when running in your Next.js app
// const ARIA_API_URL = "https://payflow-production-28a9.up.railway.app/api/aria"; // fallback proxy

let messages = [];
let currentMode = "study";
let loading = false;

function setMode(mode, btn) {
  currentMode = mode;
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
}

function handleKey(e) {
  if (e.key === "Enter" && !e.shiftKey) {
    e.preventDefault();
    send();
  }
}

function quickStart(text) {
  document.getElementById("input").value = text;
  send();
}

function addMessage(role, content) {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.className = `msg ${role}`;

  if (role === "assistant") {
    const avatar = document.createElement("div");
    avatar.className = "avatar";
    avatar.textContent = "A";

    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;

    div.appendChild(avatar);
    div.appendChild(bubble);
  } else {
    const bubble = document.createElement("div");
    bubble.className = "bubble";
    bubble.textContent = content;
    div.appendChild(bubble);
  }

  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function showTyping() {
  const container = document.getElementById("messages");
  const div = document.createElement("div");
  div.id = "typing";
  div.className = "msg assistant";
  div.innerHTML = `
    <div class="avatar">A</div>
    <div class="bubble" style="padding:14px 18px; opacity:0.7;">Thinking...</div>
  `;
  container.appendChild(div);
  container.scrollTop = container.scrollHeight;
}

function removeTyping() {
  const typing = document.getElementById("typing");
  if (typing) typing.remove();
}

async function send() {
  const input = document.getElementById("input");
  const text = input.value.trim();
  if (!text || loading) return;

  input.value = "";
  loading = true;

  addMessage("user", text);
  showTyping();

  try {
    const res = await fetch(ARIA_API_URL, {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        messages: [...messages, { role: "user", content: text }],
        mode: currentMode,
      }),
    });

    const data = await res.json();
    removeTyping();

    if (data.type === "tool_result") {
      // Handle tool output nicely
      let display = data.message || "";
      
      if (data.tool === "generate_practice_questions" && data.data) {
        display += `\n\n**Quiz Generated** (${data.data.length} questions)\n`;
        data.data.forEach((q, i) => {
          display += `\n**Q${i+1}.** ${q.question}\n`;
        });
      } 
      else if (data.tool === "analyze_readiness" && data.data) {
        display += `\n\n**Readiness:** ${data.data.new_readiness}%`;
        if (data.data.weak_domains?.length) {
          display += `\nWeak areas: ${data.data.weak_domains.join(", ")}`;
        }
      } 
      else if (data.tool === "create_study_schedule" && data.data) {
        display += `\n\n**Study Schedule Created** (${data.data.days_until_exam} days)`;
      } 
      else if (data.tool === "get_insurance_regulation" && data.data) {
        display += `\n\n${data.data.details}\n\n*${data.data.exam_note}*`;
      }

      addMessage("assistant", display);

    } else if (data.type === "claude_response") {
      addMessage("assistant", data.content);
    } else if (data.type === "error") {
      addMessage("assistant", "⚠️ " + data.message);
    } else {
      addMessage("assistant", "I received your message but couldn't process it with tools right now.");
    }

    messages.push({ role: "user", content: text });
    if (data.content) {
      messages.push({ role: "assistant", content: data.content });
    }

  } catch (err) {
    removeTyping();
    addMessage("assistant", "Connection error. Please try again.");
    console.error(err);
  }

  loading = false;
}

function clearChat() {
  messages = [];
  document.getElementById("messages").innerHTML = "";
}

// Initial greeting
window.onload = () => {
  const container = document.getElementById("messages");
  container.innerHTML = `
    <div style="text-align:center; padding:40px 20px; color:rgba(237,224,212,0.5);">
      <div style="font-size:22px; font-family:'Cormorant Garamond',serif; font-style:italic; color:#EDE0D4;">
        Ready when you are.
      </div>
      <div style="margin-top:8px; font-size:11px; letter-spacing:2px;">
        TOOL-POWERED ARIA • WISCONSIN LIFE + A&amp;H
      </div>
    </div>
  `;
};
</script>
</body>
</html>
